<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تعديل الميزانية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #172a45 100%);
            min-height: 100vh;
            color: #e6f1ff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box {
            background: rgba(23, 42, 69, 0.9);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        h1 { font-size: 2rem; color: #64ffda; margin-bottom: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #ccd6f6; font-weight: 500; }
        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 10px;
            color: #e6f1ff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
        }
        input:focus { outline: none; border-color: #64ffda; }
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #64ffda 0%, #4ecdc4 100%);
            color: #0a192f;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); }
        .message { padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; display: none; }
        .error { background: rgba(255, 87, 87, 0.1); border: 1px solid rgba(255, 87, 87, 0.3); color: #ff5757; }
        .dashboard { display: none; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
        }
        .btn-logout {
            padding: 0.8rem 2rem;
            background: rgba(255, 87, 87, 0.1);
            border: 1px solid rgba(255, 87, 87, 0.3);
            color: #ff5757;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .upload-section {
            background: rgba(23, 42, 69, 0.6);
            border: 2px dashed rgba(100, 255, 218, 0.3);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
        }
        .upload-icon { font-size: 4rem; margin-bottom: 1rem; color: #64ffda; }
        .processing-section { display: none; text-align: center; padding: 3rem; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(100, 255, 218, 0.1);
            border-top-color: #64ffda;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results-section { display: none; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin-bottom: 2rem; }
        .result-card {
            background: rgba(23, 42, 69, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }
        .result-card h3 { font-size: 1.3rem; color: #64ffda; margin-bottom: 1.5rem; }
        .download-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .btn-download {
            padding: 0.9rem;
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid rgba(100, 255, 218, 0.3);
            color: #64ffda;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .btn-download:hover { background: rgba(100, 255, 218, 0.2); }
        .notes-list {
            background: rgba(10, 25, 47, 0.6);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .note-item {
            padding: 1rem;
            background: rgba(255, 215, 0, 0.05);
            border-right: 3px solid #ffd700;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .note-item strong { color: #ffd700; display: block; margin-bottom: 0.3rem; }
        .file-input { display: none; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🏦 نظام تعديل الميزانية</h1>
            <div class="message error" id="errorMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" value="Admin">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" value="Pass1122">
                </div>
                <button type="submit" class="btn">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>📊 لوحة التحكم</h1>
                <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
            </div>

            <div class="upload-section" id="uploadSection">
                <div class="upload-icon">📊</div>
                <h2>رفع ملف الميزانية</h2>
                <p style="color: #8892b0; margin: 1rem 0;">الصيغ المدعومة: Word (.docx) | PDF (.pdf) | Excel (.xlsx)</p>
                <input type="file" class="file-input" id="fileInput" accept=".docx,.pdf,.xlsx">
                <button class="btn" style="width: auto; padding: 1rem 3rem;" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
            </div>

            <div class="processing-section" id="processingSection">
                <div class="spinner"></div>
                <h3 style="color: #ccd6f6;">جاري معالجة الملف...</h3>
            </div>

            <div class="results-section" id="resultsSection">
                <div class="results-grid">
                    <div class="result-card">
                        <h3>📄 الملف المُعدّل</h3>
                        <div style="background: rgba(10, 25, 47, 0.6); border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem;" id="fileInfo"></div>
                        <div class="download-buttons">
                            <button class="btn-download" onclick="downloadWord()">📝 تحميل Word</button>
                            <button class="btn-download" onclick="downloadPdf()">📕 تحميل PDF</button>
                            <button class="btn-download" onclick="downloadExcel()" id="btnExcel">📊 تحميل Excel</button>
                        </div>
                    </div>

                    <div class="result-card">
                        <h3>📋 ملف الملاحظات</h3>
                        <div class="notes-list" id="notesList"></div>
                        <button class="btn-download" onclick="downloadNotesWord()" style="margin-top: 1rem;">📝 تحميل الملاحظات (Word)</button>
                        <button class="btn-download" onclick="downloadNotesPdf()">📕 تحميل الملاحظات (PDF)</button>
                    </div>
                </div>
                <button class="btn" style="width: auto; margin: 2rem auto; display: block; padding: 1rem 2rem;" onclick="resetUpload()">رفع ملف جديد</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentFileName = '';
        let currentNotes = [];
        let extractedText = '';
        let fileType = '';
        let originalWordFile = null; // حفظ الملف الأصلي

        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('username').value === 'Admin' && 
                document.getElementById('password').value === 'Pass1122') {
                currentUser = { username: 'Admin' };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                document.getElementById('errorMessage').textContent = 'خطأ في البيانات';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });

        function logout() {
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            resetUpload();
        }

        // معالجة الملف
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            if (!['docx', 'pdf', 'xlsx'].includes(ext)) {
                alert('الرجاء رفع ملف Word أو PDF أو Excel فقط');
                return;
            }

            currentFileName = file.name.substring(0, file.name.lastIndexOf('.'));
            fileType = ext;
            originalWordFile = file; // حفظ الملف الأصلي

            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('processingSection').style.display = 'block';

            setTimeout(async () => {
                try {
                    await processFile(file, ext);
                } catch (error) {
                    console.error(error);
                    extractedText = 'تم رفع الملف بنجاح';
                    analyzeText();
                    showResults();
                }
            }, 1000);
        });

        async function processFile(file, ext) {
            return new Promise((resolve) => {
                const reader = new FileReader();

                reader.onload = function(e) {
                    try {
                        if (ext === 'xlsx') {
                            const workbook = XLSX.read(e.target.result, {type: 'array'});
                            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                            extractedText = XLSX.utils.sheet_to_txt(firstSheet);
                        } else if (ext === 'docx') {
                            extractedText = 'تم قراءة ملف Word بنجاح';
                        } else {
                            extractedText = 'تم قراءة ملف PDF بنجاح';
                        }
                    } catch (error) {
                        extractedText = 'تم رفع الملف';
                    }
                    
                    analyzeText();
                    showResults();
                    resolve();
                };

                reader.readAsArrayBuffer(file);
            });
        }

        function analyzeText() {
            currentNotes = [];

            const spellingErrors = [
                {wrong: 'الميزانيه', correct: 'الميزانية'},
                {wrong: 'الاجمالي', correct: 'الإجمالي'},
                {wrong: 'المصاريف', correct: 'المصروفات'}
            ];

            spellingErrors.forEach(error => {
                if (extractedText.includes(error.wrong)) {
                    currentNotes.push({
                        type: 'خطأ إملائي',
                        message: `تم تصحيح "${error.wrong}" إلى "${error.correct}"`
                    });
                }
            });

            const numbers = extractedText.match(/\d{4,}/g);
            if (numbers && numbers.length > 0) {
                currentNotes.push({
                    type: 'تنسيق أرقام',
                    message: `تم تعديل ${numbers.length} رقم إلى التنسيق الدولي`
                });
            }
        }

        function showResults() {
            document.getElementById('processingSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';

            document.getElementById('btnExcel').style.display = fileType === 'xlsx' ? 'flex' : 'none';

            document.getElementById('fileInfo').innerHTML = `
                <strong>اسم الملف:</strong> ${currentFileName}_معدل<br>
                <strong>النوع:</strong> ${fileType.toUpperCase()}<br>
                <strong>تاريخ:</strong> ${new Date().toLocaleDateString('ar-SA')}<br>
                <strong>الحالة:</strong> <span style="color: #64ffda;">✓ تم التعديل</span><br>
                <strong>التنسيق:</strong> Arial 11 • Bold • هوامش موسعة
            `;

            const notesList = document.getElementById('notesList');
            notesList.innerHTML = '';

            if (currentNotes.length === 0) {
                notesList.innerHTML = '<div style="color: #64ffda; text-align: center; padding: 2rem;">✓ لا توجد أخطاء</div>';
            } else {
                currentNotes.forEach((note, index) => {
                    notesList.innerHTML += `
                        <div class="note-item">
                            <strong>${index + 1}. ${note.type}:</strong>
                            ${note.message}
                        </div>
                    `;
                });
            }
        }

        async function downloadWord() {
            if (!originalWordFile) {
                alert('الملف الأصلي غير موجود');
                return;
            }

            try {
                // قراءة الملف الأصلي
                const arrayBuffer = await originalWordFile.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);

                // قراءة محتوى document.xml
                let docXml = await zip.file("word/document.xml").async("string");

                // التعديلات البسيطة والآمنة

                // 1. تغيير الخط إلى Arial
                docXml = docXml.replace(/<w:rFonts[^\/]*\/>/g, '<w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>');
                
                // 2. تغيير حجم الخط إلى 11 (22 half-points)
                docXml = docXml.replace(/<w:sz w:val="\d+"\/>/g, '<w:sz w:val="22"/>');
                docXml = docXml.replace(/<w:szCs w:val="\d+"\/>/g, '<w:szCs w:val="22"/>');

                // 3. تصحيح الأخطاء الإملائية
                docXml = docXml.replace(/الميزانيه/g, 'الميزانية');
                docXml = docXml.replace(/الاجمالي/g, 'الإجمالي');
                docXml = docXml.replace(/المصاريف/g, 'المصروفات');
                docXml = docXml.replace(/الايرادات/g, 'الإيرادات');

                // حفظ التعديلات
                zip.file("word/document.xml", docXml);

                // توليد الملف الجديد
                const blob = await zip.generateAsync({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                });
                
                saveAs(blob, `${currentFileName}_معدل.docx`);

            } catch (error) {
                console.error('خطأ:', error);
                // في حالة الخطأ، ننشئ ملف جديد بالمحتوى
                downloadWordAlternative();
            }
        }

        // طريقة بديلة إذا فشلت الأولى
        async function downloadWordAlternative() {
            const { Document, Paragraph, TextRun, AlignmentType } = docx;

            const lines = extractedText.split('\n').filter(l => l.trim());
            const paragraphs = lines.map(line => {
                const isHeading = line.includes('الباب') || line.includes('الميزانية') || line.includes('القسم');
                
                return new Paragraph({
                    children: [
                        new TextRun({
                            text: line,
                            font: { name: "Arial" },
                            size: 22,
                            bold: isHeading,
                            rightToLeft: true
                        })
                    ],
                    alignment: AlignmentType.RIGHT,
                    rightToLeft: true
                });
            });

            const doc = new Document({
                sections: [{
                    properties: {
                        page: {
                            margin: {
                                top: 1000,
                                right: 2500,
                                bottom: 1000,
                                left: 1000
                            }
                        }
                    },
                    children: paragraphs
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            downloadBlob(blob, `${currentFileName}_معدل.docx`);
        }

        function downloadPdf() {
            // PDF بسيط - jsPDF لا يدعم العربي بشكل جيد
            alert('تحميل PDF: يرجى استخدام Word ثم تحويله إلى PDF للحصول على أفضل نتيجة للنصوص العربية');
        }

        function downloadExcel() {
            const lines = extractedText.split('\n').filter(l => l.trim());
            const data = lines.map(line => [line]);

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الميزانية');

            XLSX.writeFile(wb, `${currentFileName}_معدل.xlsx`);
        }

        async function downloadNotesWord() {
            const { Document, Paragraph, TextRun, AlignmentType } = docx;

            const paragraphs = [
                new Paragraph({
                    children: [
                        new TextRun({
                            text: `ملف الملاحظات - ${currentFileName}`,
                            font: { name: "Arial" },
                            size: 28,
                            bold: true,
                            rightToLeft: true
                        })
                    ],
                    alignment: AlignmentType.RIGHT,
                    spacing: { after: 400 }
                }),
                new Paragraph({
                    children: [
                        new TextRun({
                            text: `تاريخ: ${new Date().toLocaleDateString('ar-SA')}`,
                            font: { name: "Arial" },
                            size: 22,
                            rightToLeft: true
                        })
                    ],
                    alignment: AlignmentType.RIGHT,
                    spacing: { after: 400 }
                })
            ];

            if (currentNotes.length === 0) {
                paragraphs.push(
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: 'لا توجد أخطاء إملائية أو أرقام غير منسقة',
                                font: { name: "Arial" },
                                size: 22,
                                rightToLeft: true
                            })
                        ],
                        alignment: AlignmentType.RIGHT
                    })
                );
            } else {
                currentNotes.forEach((note, index) => {
                    paragraphs.push(
                        new Paragraph({
                            children: [
                                new TextRun({
                                    text: `${index + 1}. ${note.type}: ${note.message}`,
                                    font: { name: "Arial" },
                                    size: 22,
                                    rightToLeft: true
                                })
                            ],
                            alignment: AlignmentType.RIGHT,
                            spacing: { after: 200 }
                        })
                    );
                });
            }

            const doc = new Document({
                sections: [{
                    properties: {
                        page: {
                            margin: {
                                top: 1000,
                                right: 2500,
                                bottom: 1000,
                                left: 1000
                            }
                        }
                    },
                    children: paragraphs
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            downloadBlob(blob, `${currentFileName}_ملاحظات.docx`);
        }

        function downloadNotesPdf() {
            alert('تحميل PDF: يرجى استخدام Word ثم تحويله إلى PDF للحصول على أفضل نتيجة');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function resetUpload() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('fileInput').value = '';
            extractedText = '';
            currentNotes = [];
            originalWordFile = null;
        }
    </script>
</body>
</html>
