<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تعديل الميزانية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #172a45 100%);
            min-height: 100vh;
            color: #e6f1ff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box {
            background: rgba(23, 42, 69, 0.9);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        h1 { font-size: 2rem; color: #64ffda; margin-bottom: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #ccd6f6; font-weight: 500; }
        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 10px;
            color: #e6f1ff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
        }
        input:focus { outline: none; border-color: #64ffda; }
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #64ffda 0%, #4ecdc4 100%);
            color: #0a192f;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; display: none; }
        .error { background: rgba(255, 87, 87, 0.1); border: 1px solid rgba(255, 87, 87, 0.3); color: #ff5757; }
        .success { background: rgba(100, 255, 218, 0.1); border: 1px solid rgba(100, 255, 218, 0.3); color: #64ffda; }
        .dashboard { display: none; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
        }
        .btn-logout {
            padding: 0.8rem 2rem;
            background: rgba(255, 87, 87, 0.1);
            border: 1px solid rgba(255, 87, 87, 0.3);
            color: #ff5757;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .upload-section {
            background: rgba(23, 42, 69, 0.6);
            border: 2px dashed rgba(100, 255, 218, 0.3);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
        }
        .upload-icon { font-size: 4rem; margin-bottom: 1rem; color: #64ffda; }
        .processing-section { display: none; text-align: center; padding: 3rem; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(100, 255, 218, 0.1);
            border-top-color: #64ffda;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results-section { display: none; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin-bottom: 2rem; }
        .result-card {
            background: rgba(23, 42, 69, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }
        .result-card h3 { font-size: 1.3rem; color: #64ffda; margin-bottom: 1.5rem; }
        .download-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .btn-download {
            padding: 0.9rem;
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid rgba(100, 255, 218, 0.3);
            color: #64ffda;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .btn-download:hover { background: rgba(100, 255, 218, 0.2); }
        .notes-list {
            background: rgba(10, 25, 47, 0.6);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .note-item {
            padding: 1rem;
            background: rgba(255, 215, 0, 0.05);
            border-right: 3px solid #ffd700;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .note-item strong { color: #ffd700; display: block; margin-bottom: 0.3rem; }
        .file-input { display: none; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🏦 نظام تعديل الميزانية</h1>
            <div class="message error" id="errorMessage"></div>
            <div class="message success" id="successMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" value="Admin" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" value="Pass1122" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>📊 لوحة التحكم</h1>
                <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
            </div>

            <div class="upload-section" id="uploadSection">
                <div class="upload-icon">📊</div>
                <h2>رفع ملف الميزانية</h2>
                <p style="color: #8892b0; margin: 1rem 0;">سيتم رفع الملف إلى قاعدة البيانات ومعالجته تلقائياً</p>
                <p style="color: #64ffda; font-size: 0.9rem;">Word (.docx) | Excel (.xlsx)</p>
                <input type="file" class="file-input" id="fileInput" accept=".docx,.xlsx">
                <button class="btn" style="width: auto; padding: 1rem 3rem;" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
            </div>

            <div class="processing-section" id="processingSection">
                <div class="spinner"></div>
                <h3 style="color: #ccd6f6;" id="processingText">جاري رفع الملف إلى قاعدة البيانات...</h3>
                <p style="color: #8892b0; margin-top: 1rem;" id="processingDetails"></p>
            </div>

            <div class="results-section" id="resultsSection">
                <div class="results-grid">
                    <div class="result-card">
                        <h3>📄 الملف المُعدّل</h3>
                        <div style="background: rgba(10, 25, 47, 0.6); border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem;" id="fileInfo"></div>
                        <div class="download-buttons">
                            <button class="btn-download" onclick="downloadWord()">📝 تحميل Word</button>
                            <button class="btn-download" onclick="downloadExcel()" id="btnExcel" style="display:none;">📊 تحميل Excel</button>
                        </div>
                    </div>

                    <div class="result-card">
                        <h3>📋 ملف الملاحظات</h3>
                        <div class="notes-list" id="notesList"></div>
                        <button class="btn-download" onclick="downloadNotesWord()" style="margin-top: 1rem;">📝 تحميل الملاحظات</button>
                    </div>
                </div>
                <button class="btn" style="width: auto; margin: 2rem auto; display: block; padding: 1rem 2rem;" onclick="resetUpload()">رفع ملف جديد</button>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let supabaseClient;
        let currentUser = null;
        let currentFileName = '';
        let currentNotes = [];
        let extractedText = '';
        let fileType = '';
        let uploadedFileId = null;

        // تهيئة Supabase
        function initSupabase() {
            try {
                supabaseClient = supabase.createClient(
                    SUPABASE_CONFIG.SUPABASE_URL,
                    SUPABASE_CONFIG.SUPABASE_ANON_KEY
                );
                console.log('✅ تم الاتصال بـ Supabase');
            } catch (error) {
                console.error('❌ خطأ في الاتصال:', error);
            }
        }

        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'جاري التحقق...';

            try {
                console.log('🔍 محاولة تسجيل الدخول:', username);
                
                // البحث عن المستخدم - بدون فلتر is_active أولاً
                const { data: admins, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', username);

                console.log('📊 نتيجة البحث:', { admins, error });

                if (error) {
                    console.error('❌ خطأ من Supabase:', error);
                    throw new Error('خطأ في الاتصال بقاعدة البيانات: ' + error.message);
                }

                if (!admins || admins.length === 0) {
                    throw new Error('اسم المستخدم غير موجود');
                }

                const user = admins[0];

                // التحقق من أن الحساب نشط
                if (!user.is_active) {
                    throw new Error('هذا الحساب غير نشط');
                }

                // التحقق من كلمة المرور
                if (user.password_hash !== password) {
                    throw new Error('كلمة المرور غير صحيحة');
                }

                console.log('✅ تم تسجيل الدخول بنجاح');
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch (error) {
                console.error('❌ خطأ في تسجيل الدخول:', error);
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'تسجيل الدخول';
            }
        });

        function logout() {
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            resetUpload();
        }

        // معالجة رفع الملف
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            if (!['docx', 'xlsx'].includes(ext)) {
                alert('الرجاء رفع ملف Word أو Excel فقط');
                return;
            }

            currentFileName = file.name.substring(0, file.name.lastIndexOf('.'));
            fileType = ext;

            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('processingSection').style.display = 'block';
            document.getElementById('processingText').textContent = 'جاري رفع الملف إلى قاعدة البيانات...';
            document.getElementById('processingDetails').textContent = 'الخطوة 1/4: رفع الملف';

            try {
                // الخطوة 1: رفع الملف وحفظه في قاعدة البيانات
                await uploadAndProcessFile(file);
            } catch (error) {
                console.error('خطأ:', error);
                alert('حدث خطأ: ' + error.message);
                resetUpload();
            }
        });

        async function uploadAndProcessFile(file) {
            try {
                // الخطوة 1: حفظ معلومات الملف في جدول uploaded_files
                document.getElementById('processingDetails').textContent = 'الخطوة 1/4: حفظ معلومات الملف...';
                
                const { data: fileRecord, error: insertError } = await supabaseClient
                    .from('uploaded_files')
                    .insert({
                        admin_id: currentUser.id,
                        original_filename: file.name,
                        file_type: fileType,
                        file_size: file.size,
                        file_path: `uploads/${currentUser.id}/${Date.now()}_${file.name}`,
                        status: 'processing',
                        processing_started_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (insertError) throw insertError;
                
                uploadedFileId = fileRecord.id;
                console.log('✅ تم حفظ معلومات الملف:', fileRecord);

                // الخطوة 2: قراءة محتوى الملف
                document.getElementById('processingDetails').textContent = 'الخطوة 2/4: قراءة محتوى الملف...';
                await readFileContent(file);

                // الخطوة 3: تحليل الملف واستخراج الأخطاء
                document.getElementById('processingDetails').textContent = 'الخطوة 3/4: تحليل المحتوى...';
                analyzeText();

                // الخطوة 4: حفظ الملاحظات في قاعدة البيانات
                document.getElementById('processingDetails').textContent = 'الخطوة 4/4: حفظ الملاحظات...';
                await saveNotes();

                // تحديث حالة الملف إلى completed
                await supabaseClient
                    .from('uploaded_files')
                    .update({
                        status: 'completed',
                        processing_completed_at: new Date().toISOString()
                    })
                    .eq('id', uploadedFileId);

                console.log('✅ تمت معالجة الملف بنجاح');
                
                // عرض النتائج
                showResults();

            } catch (error) {
                // تحديث حالة الملف إلى failed
                if (uploadedFileId) {
                    await supabaseClient
                        .from('uploaded_files')
                        .update({ status: 'failed' })
                        .eq('id', uploadedFileId);
                }
                throw error;
            }
        }

        async function readFileContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = async function(e) {
                    const content = e.target.result;
                    
                    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                    console.log('📂 معلومات الملف:');
                    console.log('الاسم:', file.name);
                    console.log('النوع:', fileType);
                    console.log('الحجم:', file.size, 'بايت');
                    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

                    try {
                        if (fileType === 'docx') {
                            console.log('🔧 محاولة فتح ملف Word...');
                            const zip = new PizZip(content);
                            
                            const allFiles = Object.keys(zip.files);
                            console.log('📁 عدد الملفات في ZIP:', allFiles.length);
                            console.log('📁 أول 10 ملفات:', allFiles.slice(0, 10));
                            
                            // البحث عن document.xml بطرق مختلفة
                            let docXmlPath = null;
                            
                            if (zip.files["word/document.xml"]) {
                                docXmlPath = "word/document.xml";
                            } else {
                                // البحث في كل الملفات
                                docXmlPath = allFiles.find(f => 
                                    f.toLowerCase().endsWith('document.xml')
                                );
                            }
                            
                            console.log('🔍 مسار document.xml:', docXmlPath);
                            
                            if (!docXmlPath) {
                                console.error('❌ لم يتم العثور على document.xml');
                                console.log('جميع الملفات:', allFiles);
                                throw new Error('ملف Word تالف - لا يحتوي على document.xml');
                            }
                            
                            // قراءة XML
                            const xml = await zip.files[docXmlPath].async("string");
                            console.log('✅ تم قراءة XML - الحجم:', xml.length, 'حرف');
                            
                            // استخراج النصوص
                            const textRegex = /<w:t[^>]*>([^<]+)<\/w:t>/g;
                            const textMatches = [...xml.matchAll(textRegex)];
                            
                            console.log('📝 عدد النصوص:', textMatches.length);
                            
                            if (textMatches.length === 0) {
                                console.warn('⚠️ الملف لا يحتوي على نصوص');
                                extractedText = 'ملف فارغ - لا يحتوي على نصوص';
                            } else {
                                const texts = textMatches.map(match => match[1]);
                                extractedText = texts.join(' ');
                                console.log('✅ أول 100 حرف:', extractedText.substring(0, 100));
                                console.log('✅ إجمالي:', extractedText.length, 'حرف');
                            }
                            
                        } else if (fileType === 'xlsx') {
                            const workbook = XLSX.read(content, {type: 'array'});
                            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                            extractedText = XLSX.utils.sheet_to_txt(firstSheet);
                            console.log('✅ تم قراءة Excel');
                        }
                        
                        resolve();
                    } catch (error) {
                        console.error('━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                        console.error('❌ خطأ:', error.message);
                        console.error('━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                        reject(error);
                    }
                };

                reader.onerror = (error) => {
                    console.error('❌ خطأ في القراءة:', error);
                    reject(error);
                };
                
                reader.readAsArrayBuffer(file);
            });
        }

        function analyzeText() {
            currentNotes = [];

            const spellingErrors = [
                {wrong: 'الميزانيه', correct: 'الميزانية'},
                {wrong: 'الاجمالي', correct: 'الإجمالي'},
                {wrong: 'المصاريف', correct: 'المصروفات'},
                {wrong: 'الايرادات', correct: 'الإيرادات'}
            ];

            spellingErrors.forEach(error => {
                if (extractedText.includes(error.wrong)) {
                    currentNotes.push({
                        note_type: 'spelling',
                        note_type_ar: 'خطأ إملائي',
                        original_text: error.wrong,
                        corrected_text: error.correct,
                        message: `تم تصحيح "${error.wrong}" إلى "${error.correct}"`,
                        severity: 'warning'
                    });
                }
            });

            const numbers = extractedText.match(/\d{4,}/g);
            if (numbers && numbers.length > 0) {
                currentNotes.push({
                    note_type: 'numbers',
                    note_type_ar: 'تنسيق أرقام',
                    message: `تم تعديل ${numbers.length} رقم إلى التنسيق الدولي`,
                    severity: 'info'
                });
            }

            console.log('✅ تم تحليل النص:', currentNotes.length, 'ملاحظة');
        }

        async function saveNotes() {
            if (currentNotes.length === 0) {
                console.log('ℹ️ لا توجد ملاحظات لحفظها');
                return;
            }

            const notesToInsert = currentNotes.map(note => ({
                uploaded_file_id: uploadedFileId,
                page_number: '1',
                note_type: note.note_type,
                note_type_ar: note.note_type_ar,
                original_text: note.original_text || null,
                corrected_text: note.corrected_text || null,
                message: note.message,
                severity: note.severity
            }));

            const { error } = await supabaseClient
                .from('file_notes')
                .insert(notesToInsert);

            if (error) throw error;
            
            console.log('✅ تم حفظ الملاحظات في قاعدة البيانات');
        }

        function showResults() {
            document.getElementById('processingSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';

            document.getElementById('btnExcel').style.display = fileType === 'xlsx' ? 'flex' : 'none';

            document.getElementById('fileInfo').innerHTML = `
                <strong>الملف:</strong> ${currentFileName}_معدل<br>
                <strong>النوع:</strong> ${fileType.toUpperCase()}<br>
                <strong>التاريخ:</strong> ${new Date().toLocaleDateString('ar-SA')}<br>
                <strong>الحالة:</strong> <span style="color: #64ffda;">✓ تم المعالجة</span><br>
                <strong>المحتوى:</strong> ${extractedText.length} حرف<br>
                <strong>المعالج:</strong> ${currentUser.username}
            `;

            const notesList = document.getElementById('notesList');
            notesList.innerHTML = '';

            if (currentNotes.length === 0) {
                notesList.innerHTML = '<div style="color: #64ffda; text-align: center; padding: 2rem;">✓ لا توجد أخطاء إملائية أو أرقام غير منسقة</div>';
            } else {
                currentNotes.forEach((note, index) => {
                    notesList.innerHTML += `
                        <div class="note-item">
                            <strong>${index + 1}. ${note.note_type_ar}:</strong>
                            ${note.message}
                        </div>
                    `;
                });
            }
        }

        async function downloadWord() {
            const { Document, Paragraph, TextRun, AlignmentType } = docx;

            let text = extractedText;
            text = text.replace(/الميزانيه/g, 'الميزانية');
            text = text.replace(/الاجمالي/g, 'الإجمالي');
            text = text.replace(/المصاريف/g, 'المصروفات');
            text = text.replace(/الايرادات/g, 'الإيرادات');

            const parts = text.split(/\n+/);
            const paragraphs = [];

            parts.forEach(part => {
                if (!part.trim()) return;

                const isHeading = 
                    part.includes('الباب') || 
                    part.includes('الفصل') ||
                    part.includes('الميزانية') ||
                    part.length < 60;

                paragraphs.push(
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: part.trim(),
                                font: { name: "Arial" },
                                size: 22,
                                bold: isHeading,
                                rightToLeft: true
                            })
                        ],
                        alignment: AlignmentType.RIGHT,
                        rightToLeft: true,
                        spacing: { after: 120 }
                    })
                );
            });

            const doc = new Document({
                sections: [{
                    properties: {
                        page: {
                            margin: {
                                top: 1000,
                                right: 2500,
                                bottom: 1000,
                                left: 1000
                            }
                        }
                    },
                    children: paragraphs
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            saveAs(blob, `${currentFileName}_معدل.docx`);
        }

        function downloadExcel() {
            const lines = extractedText.split('\n').filter(l => l.trim());
            const data = lines.map(line => [line]);

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الميزانية');

            XLSX.writeFile(wb, `${currentFileName}_معدل.xlsx`);
        }

        async function downloadNotesWord() {
            const { Document, Paragraph, TextRun, AlignmentType } = docx;

            const paragraphs = [
                new Paragraph({
                    children: [
                        new TextRun({
                            text: `ملف الملاحظات - ${currentFileName}`,
                            font: { name: "Arial" },
                            size: 28,
                            bold: true,
                            rightToLeft: true
                        })
                    ],
                    alignment: AlignmentType.RIGHT,
                    spacing: { after: 400 }
                })
            ];

            if (currentNotes.length === 0) {
                paragraphs.push(
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: 'لا توجد أخطاء إملائية أو أرقام غير منسقة',
                                font: { name: "Arial" },
                                size: 22,
                                rightToLeft: true
                            })
                        ],
                        alignment: AlignmentType.RIGHT
                    })
                );
            } else {
                currentNotes.forEach((note, i) => {
                    paragraphs.push(
                        new Paragraph({
                            children: [
                                new TextRun({
                                    text: `${i + 1}. ${note.note_type_ar}: ${note.message}`,
                                    font: { name: "Arial" },
                                    size: 22,
                                    rightToLeft: true
                                })
                            ],
                            alignment: AlignmentType.RIGHT,
                            spacing: { after: 200 }
                        })
                    );
                });
            }

            const doc = new Document({
                sections: [{
                    children: paragraphs
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            saveAs(blob, `${currentFileName}_ملاحظات.docx`);
        }

        function resetUpload() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('fileInput').value = '';
            extractedText = '';
            currentNotes = [];
            uploadedFileId = null;
        }

        // تهيئة النظام
        window.addEventListener('DOMContentLoaded', initSupabase);
    </script>
</body>
</html>
