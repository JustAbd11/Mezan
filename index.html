<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تعديل الميزانية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #172a45 100%);
            min-height: 100vh;
            color: #e6f1ff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box {
            background: rgba(23, 42, 69, 0.9);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        h1 { font-size: 2rem; color: #64ffda; margin-bottom: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #ccd6f6; font-weight: 500; }
        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 10px;
            color: #e6f1ff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
        }
        input:focus { outline: none; border-color: #64ffda; }
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #64ffda 0%, #4ecdc4 100%);
            color: #0a192f;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; display: none; }
        .error { background: rgba(255, 87, 87, 0.1); border: 1px solid rgba(255, 87, 87, 0.3); color: #ff5757; }
        .dashboard { display: none; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
        }
        .btn-logout {
            padding: 0.8rem 2rem;
            background: rgba(255, 87, 87, 0.1);
            border: 1px solid rgba(255, 87, 87, 0.3);
            color: #ff5757;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .upload-section {
            background: rgba(23, 42, 69, 0.6);
            border: 2px dashed rgba(100, 255, 218, 0.3);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
        }
        .upload-icon { font-size: 4rem; margin-bottom: 1rem; color: #64ffda; }
        .processing-section { display: none; text-align: center; padding: 3rem; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(100, 255, 218, 0.1);
            border-top-color: #64ffda;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results-section { display: none; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin-bottom: 2rem; }
        .result-card {
            background: rgba(23, 42, 69, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }
        .result-card h3 { font-size: 1.3rem; color: #64ffda; margin-bottom: 1.5rem; }
        .download-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .btn-download {
            padding: 0.9rem;
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid rgba(100, 255, 218, 0.3);
            color: #64ffda;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .btn-download:hover { background: rgba(100, 255, 218, 0.2); }
        .notes-list {
            background: rgba(10, 25, 47, 0.6);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .note-item {
            padding: 1rem;
            background: rgba(255, 215, 0, 0.05);
            border-right: 3px solid #ffd700;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .note-item strong { color: #ffd700; display: block; margin-bottom: 0.3rem; }
        .file-input { display: none; }
        .preview-box {
            background: rgba(10, 25, 47, 0.6);
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: right;
            direction: rtl;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Cairo', sans-serif;
            line-height: 1.8;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🏦 نظام تعديل الميزانية</h1>
            <div class="message error" id="errorMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" value="Admin" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" value="Pass1122" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1>📊 لوحة التحكم</h1>
                <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
            </div>

            <div class="upload-section" id="uploadSection">
                <div class="upload-icon">📊</div>
                <h2>رفع ملف الميزانية</h2>
                <p style="color: #8892b0; margin: 1rem 0;">Word (.docx) | Excel (.xlsx) | PDF (.pdf) | Text (.txt)</p>
                <input type="file" class="file-input" id="fileInput" accept=".docx,.xlsx,.pdf,.txt">
                <button class="btn" style="width: auto; padding: 1rem 3rem;" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
            </div>

            <div class="processing-section" id="processingSection">
                <div class="spinner"></div>
                <h3 style="color: #ccd6f6;" id="processingText">جاري معالجة الملف...</h3>
            </div>

            <div class="results-section" id="resultsSection">
                <div class="results-grid">
                    <div class="result-card">
                        <h3>📄 الملف المُعدّل</h3>
                        <div style="background: rgba(10, 25, 47, 0.6); border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem;" id="fileInfo"></div>
                        <div class="preview-box" id="previewBox" style="display:none;"></div>
                        <div class="download-buttons">
                            <button class="btn-download" onclick="downloadPdf()" style="background: linear-gradient(135deg, #64ffda 0%, #4ecdc4 100%); color: #0a192f; font-weight: 700;">📕 تحميل PDF (موصى به)</button>
                            <button class="btn-download" onclick="downloadWord()">📝 تحميل Word</button>
                            <button class="btn-download" onclick="downloadExcel()" id="btnExcel" style="display:none;">📊 تحميل Excel</button>
                        </div>
                    </div>

                    <div class="result-card">
                        <h3>📋 ملف الملاحظات</h3>
                        <div class="notes-list" id="notesList"></div>
                        <button class="btn-download" onclick="downloadNotesPdf()" style="margin-top: 1rem; background: linear-gradient(135deg, #64ffda 0%, #4ecdc4 100%); color: #0a192f; font-weight: 700;">📕 تحميل الملاحظات PDF</button>
                        <button class="btn-download" onclick="downloadNotesWord()">📝 تحميل الملاحظات Word</button>
                    </div>
                </div>
                <button class="btn" style="width: auto; margin: 2rem auto; display: block; padding: 1rem 2rem;" onclick="resetUpload()">رفع ملف جديد</button>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let supabaseClient;
        let currentUser = null;
        let currentFileName = '';
        let currentNotes = [];
        let extractedText = '';
        let fileType = '';
        let uploadedFileId = null;
        let originalDocXml = '';
        let modifiedDocXml = '';
        let originalFileBlob = null;

        function initSupabase() {
            try {
                supabaseClient = supabase.createClient(
                    SUPABASE_CONFIG.SUPABASE_URL,
                    SUPABASE_CONFIG.SUPABASE_ANON_KEY
                );
                console.log('✅ تم الاتصال بـ Supabase');
            } catch (error) {
                console.error('❌ خطأ في الاتصال:', error);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.textContent = 'جاري التحقق...';

            try {
                const { data: admins, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', username);

                if (error || !admins || admins.length === 0) {
                    throw new Error('اسم المستخدم غير موجود');
                }

                const user = admins[0];
                if (!user.is_active) throw new Error('الحساب غير نشط');
                if (user.password_hash !== password) throw new Error('كلمة المرور خاطئة');

                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message;
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => document.getElementById('errorMessage').style.display = 'none', 3000);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'تسجيل الدخول';
            }
        });

        function logout() {
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            resetUpload();
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            const allowedTypes = ['docx', 'xlsx', 'pdf', 'txt'];

            if (!allowedTypes.includes(ext)) {
                alert('الرجاء رفع ملف Word, Excel, PDF, أو Text فقط');
                return;
            }

            currentFileName = file.name.substring(0, file.name.lastIndexOf('.'));
            fileType = ext;
            originalFileBlob = file;

            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('processingSection').style.display = 'block';
            document.getElementById('processingText').textContent = 'جاري قراءة الملف...';

            setTimeout(async () => {
                try {
                    if (fileType === 'docx') {
                        await processWordFile(file);
                    } else if (fileType === 'xlsx') {
                        await processExcelFile(file);
                    } else if (fileType === 'pdf') {
                        await processPdfFile(file);
                    } else if (fileType === 'txt') {
                        await processTextFile(file);
                    }
                    await saveToDatabase();
                    showResults();
                } catch (error) {
                    console.error(error);
                    alert('خطأ: ' + error.message);
                    resetUpload();
                }
            }, 500);
        });

        async function processWordFile(file) {
            try {
                // Read the DOCX file as array buffer
                const arrayBuffer = await file.arrayBuffer();

                // Use JSZip to read the DOCX (which is a ZIP file)
                const zip = await JSZip.loadAsync(arrayBuffer);

                // List all files in the ZIP for debugging
                const fileList = Object.keys(zip.files);
                console.log('📁 ملفات داخل DOCX:', fileList);

                // Find document.xml - check all possible locations
                let docXmlPath = null;
                const possiblePaths = [
                    'word/document.xml',
                    'word/document2.xml', 
                    'document.xml',
                    'xl/workbook.xml',
                    'ppt/slides/slide1.xml'
                ];

                for (const path of possiblePaths) {
                    if (zip.file(path)) {
                        docXmlPath = path;
                        break;
                    }
                }

                // If no document.xml found, try to find any XML file with text content
                if (!docXmlPath) {
                    // Look for any .xml file that might contain text
                    for (const path of fileList) {
                        if (path.endsWith('.xml') && !path.includes('_rels') && !path.includes('theme')) {
                            console.log('🔍 محاولة قراءة:', path);
                            try {
                                const content = await zip.file(path).async('text');
                                if (content.includes('<w:t') || content.includes('<a:t') || content.includes('<t>')) {
                                    docXmlPath = path;
                                    console.log('✅ تم العثور على نص في:', path);
                                    break;
                                }
                            } catch (e) {
                                // Continue searching
                            }
                        }
                    }
                }

                if (!docXmlPath) {
                    console.error('❌ جميع الملفات:', fileList);
                    throw new Error('لم يتم العثور على ملف نصي داخل ملف Word. الملف قد يكون تالفاً أو غير صالح.\nالملفات الموجودة: ' + fileList.join(', '));
                }

                // Get the document.xml content
                const docXml = await zip.file(docXmlPath).async('text');
                originalDocXml = docXml;

                // Extract text for analysis
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(docXml, 'application/xml');

                // Extract all text content - try different tags
                let textElements = xmlDoc.getElementsByTagName('w:t');
                if (textElements.length === 0) {
                    textElements = xmlDoc.getElementsByTagName('a:t');
                }
                if (textElements.length === 0) {
                    textElements = xmlDoc.getElementsByTagName('t');
                }

                let fullText = '';
                for (let el of textElements) {
                    fullText += el.textContent + ' ';
                }

                // If still no text, try to extract from XML string directly
                if (!fullText.trim()) {
                    const textMatches = docXml.match(/>([^<]{2,})</g);
                    if (textMatches) {
                        fullText = textMatches.map(m => m.replace(/[><]/g, '')).join(' ');
                    }
                }

                extractedText = fullText.trim();

                if (!extractedText) {
                    throw new Error('لم يتم استخراج أي نص من الملف. الملف قد يكون فارغاً أو تالفاً.');
                }

                console.log('✅ Word extracted:', extractedText.length, 'chars');
                console.log('📝 نص عينة:', extractedText.substring(0, 200));

                // Apply corrections to the XML
                modifiedDocXml = applyCorrectionsToXml(docXml);

                // Analyze text for notes
                analyzeText(fullText);

            } catch (error) {
                console.error('❌ خطأ في معالجة ملف Word:', error);
                throw new Error('فشل في قراءة ملف Word: ' + error.message);
            }
        }

        function applyCorrectionsToXml(xmlString) {
            let modified = xmlString;

            // Define corrections
            const corrections = [
                { wrong: 'الميزانيه', correct: 'الميزانية' },
                { wrong: 'الاجمالي', correct: 'الإجمالي' },
                { wrong: 'المصاريف', correct: 'المصروفات' },
                { wrong: 'الايرادات', correct: 'الإيرادات' },
                { wrong: 'الموازنه', correct: 'الموازنة' },
                { wrong: 'التقديريه', correct: 'التقديرية' },
                { wrong: 'الفعليه', correct: 'الفعلية' }
            ];

            corrections.forEach(corr => {
                // Replace in XML text nodes - be careful with XML structure
                const regex = new RegExp(corr.wrong, 'g');
                modified = modified.replace(regex, corr.correct);
            });

            // Also apply formatting corrections
            // Set font to Arial for all runs
            modified = modified.replace(/<w:rFonts[^>]*>/g, '<w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial" w:rtl="Arial"/>');

            // Set font size to 22 (11pt) for all runs
            modified = modified.replace(/<w:sz[^>]*>/g, '<w:sz w:val="22"/><w:szCs w:val="22"/>');

            // Expand right margin
            modified = modified.replace(
                /<w:pgMar[^>]*>/g,
                '<w:pgMar w:top="1440" w:right="2880" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/>'
            );

            return modified;
        }

        async function processExcelFile(file) {
            const reader = new FileReader();
            return new Promise((resolve) => {
                reader.onload = (e) => {
                    const workbook = XLSX.read(e.target.result, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    extractedText = XLSX.utils.sheet_to_txt(firstSheet);
                    console.log('✅ Excel:', extractedText.length, 'chars');
                    analyzeText(extractedText);
                    resolve();
                };
                reader.readAsArrayBuffer(file);
            });
        }

        async function processPdfFile(file) {
            const text = await file.text();
            extractedText = text;
            console.log('✅ PDF/Text:', extractedText.length, 'chars');
            analyzeText(extractedText);
        }

        async function processTextFile(file) {
            const text = await file.text();
            extractedText = text;
            console.log('✅ Text:', extractedText.length, 'chars');
            analyzeText(extractedText);
        }

        function analyzeText(text) {
            currentNotes = [];

            const corrections = [
                { wrong: 'الميزانيه', correct: 'الميزانية', type: 'إملائي' },
                { wrong: 'الاجمالي', correct: 'الإجمالي', type: 'إملائي' },
                { wrong: 'المصاريف', correct: 'المصروفات', type: 'إملائي' },
                { wrong: 'الايرادات', correct: 'الإيرادات', type: 'إملائي' },
                { wrong: 'الموازنه', correct: 'الموازنة', type: 'إملائي' },
                { wrong: 'التقديريه', correct: 'التقديرية', type: 'إملائي' },
                { wrong: 'الفعليه', correct: 'الفعلية', type: 'إملائي' }
            ];

            corrections.forEach(c => {
                if (text.includes(c.wrong)) {
                    currentNotes.push({
                        type: c.type,
                        message: `تصحيح "${c.wrong}" → "${c.correct}"`
                    });
                }
            });

            // Add formatting notes
            currentNotes.push({
                type: 'تنسيق',
                message: 'تم تغيير الخط إلى Arial حجم 11'
            });
            currentNotes.push({
                type: 'هوامش',
                message: 'تم توسيع الهامش الأيمن'
            });
            currentNotes.push({
                type: 'تنسيق',
                message: 'تم تطبيق Bold على العناوين'
            });
        }

        async function saveToDatabase() {
            document.getElementById('processingText').textContent = 'جاري الحفظ في قاعدة البيانات...';

            try {
                const { data, error } = await supabaseClient
                    .from('uploaded_files')
                    .insert({
                        admin_id: currentUser.id,
                        original_filename: currentFileName + '.' + fileType,
                        file_type: fileType,
                        file_size: 0,
                        file_path: 'temp/' + currentFileName,
                        status: 'completed',
                        processing_started_at: new Date().toISOString(),
                        processing_completed_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (error) {
                    console.error('❌ خطأ في الحفظ:', error);
                    throw error;
                }

                uploadedFileId = data.id;
                console.log('✅ تم الحفظ - ID:', uploadedFileId);

                if (currentNotes.length > 0) {
                    const { error: notesError } = await supabaseClient
                        .from('file_notes')
                        .insert(currentNotes.map(n => ({
                            uploaded_file_id: uploadedFileId,
                            page_number: '1',
                            note_type: 'spelling',
                            note_type_ar: n.type,
                            message: n.message,
                            severity: 'info'
                        })));

                    if (notesError) {
                        console.error('⚠️ خطأ في حفظ الملاحظات:', notesError);
                    }
                }
            } catch (error) {
                console.error('❌ فشل الحفظ في قاعدة البيانات:', error);
                throw error;
            }
        }

        function showResults() {
            document.getElementById('processingSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';

            document.getElementById('btnExcel').style.display = fileType === 'xlsx' ? 'flex' : 'none';

            document.getElementById('fileInfo').innerHTML = `
                <strong>الملف:</strong> ${currentFileName}_معدل<br>
                <strong>الأحرف:</strong> ${extractedText.length}<br>
                <strong>الحالة:</strong> <span style="color: #64ffda;">✓ تم</span>
            `;

            // Show preview
            const previewBox = document.getElementById('previewBox');
            previewBox.style.display = 'block';
            previewBox.textContent = extractedText.substring(0, 500) + (extractedText.length > 500 ? '...' : '');

            const notesList = document.getElementById('notesList');
            if (currentNotes.length === 0) {
                notesList.innerHTML = '<div style="color: #64ffda; text-align: center; padding: 2rem;">✓ لا توجد أخطاء</div>';
            } else {
                notesList.innerHTML = currentNotes.map((n, i) => `
                    <div class="note-item">
                        <strong>${i + 1}. ${n.type}:</strong>
                        ${n.message}
                    </div>
                `).join('');
            }
        }

        async function downloadWord() {
            if (fileType === 'docx' && modifiedDocXml && originalFileBlob) {
                try {
                    // Read original file again to get fresh ZIP
                    const arrayBuffer = await originalFileBlob.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);

                    // Find document.xml path
                    let docXmlPath = null;
                    const possiblePaths = [
                        'word/document.xml',
                        'word/document2.xml',
                        'document.xml'
                    ];

                    for (const path of possiblePaths) {
                        if (zip.file(path)) {
                            docXmlPath = path;
                            break;
                        }
                    }

                    // If not found in common paths, search all XML files
                    if (!docXmlPath) {
                        const fileList = Object.keys(zip.files);
                        for (const path of fileList) {
                            if (path.endsWith('.xml') && !path.includes('_rels') && !path.includes('theme')) {
                                docXmlPath = path;
                                break;
                            }
                        }
                    }

                    if (!docXmlPath) {
                        throw new Error('لم يتم العثور على ملف document.xml');
                    }

                    // Replace document.xml with corrected version
                    zip.file(docXmlPath, modifiedDocXml);

                    // Generate new DOCX
                    const blob = await zip.generateAsync({ 
                        type: 'blob', 
                        mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                        compression: 'DEFLATE'
                    });

                    saveAs(blob, `${currentFileName}_معدل.docx`);
                    console.log('✅ تم تحميل Word المعدل بنجاح');

                } catch (error) {
                    console.error('❌ خطأ في إنشاء Word:', error);
                    // Fallback to creating new document
                    await createNewWordDoc();
                }
            } else {
                // Fallback: create new Word document
                await createNewWordDoc();
            }
        }

        async function createNewWordDoc() {
            const { Document, Paragraph, TextRun, AlignmentType } = docx;

            let text = extractedText || 'لا يوجد محتوى';

            const corrections = [
                { wrong: 'الميزانيه', correct: 'الميزانية' },
                { wrong: 'الاجمالي', correct: 'الإجمالي' },
                { wrong: 'المصاريف', correct: 'المصروفات' },
                { wrong: 'الايرادات', correct: 'الإيرادات' },
                { wrong: 'الموازنه', correct: 'الموازنة' },
                { wrong: 'التقديريه', correct: 'التقديرية' },
                { wrong: 'الفعليه', correct: 'الفعلية' }
            ];

            corrections.forEach(c => {
                text = text.replace(new RegExp(c.wrong, 'g'), c.correct);
            });

            const lines = text.split(/[\n\r]+/).filter(line => line.trim());
            const paragraphs = [];

            if (lines.length === 0) {
                paragraphs.push(
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: "محتوى الملف",
                                font: "Arial",
                                size: 22,
                                rightToLeft: true
                            })
                        ],
                        alignment: AlignmentType.RIGHT
                    })
                );
            } else {
                lines.forEach(line => {
                    const trimmedLine = line.trim();
                    if (trimmedLine) {
                        const isHeading = 
                            trimmedLine.includes('الباب') || 
                            trimmedLine.includes('الفصل') ||
                            trimmedLine.includes('الميزانية') ||
                            trimmedLine.includes('الإجمالي') ||
                            trimmedLine.length < 60;

                        paragraphs.push(
                            new Paragraph({
                                children: [
                                    new TextRun({
                                        text: trimmedLine,
                                        font: "Arial",
                                        size: 22,
                                        bold: isHeading,
                                        rightToLeft: true
                                    })
                                ],
                                alignment: AlignmentType.RIGHT,
                                rightToLeft: true,
                                spacing: { after: 100 }
                            })
                        );
                    }
                });
            }

            const doc = new Document({
                sections: [{
                    properties: {
                        page: {
                            margin: {
                                top: 1000,
                                right: 2500,
                                bottom: 1000,
                                left: 1000
                            }
                        }
                    },
                    children: paragraphs
                }]
            });

            try {
                const blob = await docx.Packer.toBlob(doc);
                saveAs(blob, `${currentFileName}_معدل.docx`);
                console.log('✅ تم تحميل Word بنجاح');
            } catch (error) {
                console.error('❌ خطأ في إنشاء Word:', error);
                alert('حدث خطأ في إنشاء ملف Word');
            }
        }

        async function downloadPdf() {
            const { jsPDF } = window.jspdf;

            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            let text = extractedText || 'لا يوجد محتوى';

            const corrections = [
                { wrong: 'الميزانيه', correct: 'الميزانية' },
                { wrong: 'الاجمالي', correct: 'الإجمالي' },
                { wrong: 'المصاريف', correct: 'المصروفات' },
                { wrong: 'الايرادات', correct: 'الإيرادات' },
                { wrong: 'الموازنه', correct: 'الموازنة' },
                { wrong: 'التقديريه', correct: 'التقديرية' },
                { wrong: 'الفعليه', correct: 'الفعلية' }
            ];

            corrections.forEach(c => {
                text = text.replace(new RegExp(c.wrong, 'g'), c.correct);
            });

            const lines = text.split(/[\n\r]+/).filter(line => line.trim());

            const pageWidth = 210;
            const pageHeight = 297;
            const margin = 20;
            const lineHeight = 7;
            let y = margin;

            doc.setFont('helvetica');
            doc.setFontSize(11);

            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text(currentFileName + '_معدل', pageWidth - margin, y, { align: 'right' });
            y += lineHeight * 2;

            doc.setFontSize(11);
            doc.setFont('helvetica', 'normal');

            lines.forEach((line) => {
                if (y > pageHeight - margin) {
                    doc.addPage();
                    y = margin;
                }

                const trimmedLine = line.trim();
                if (trimmedLine) {
                    const reversedLine = trimmedLine.split('').reverse().join('');
                    const maxWidth = pageWidth - (2 * margin);
                    const textLines = doc.splitTextToSize(reversedLine, maxWidth);

                    textLines.forEach(textLine => {
                        if (y > pageHeight - margin) {
                            doc.addPage();
                            y = margin;
                        }

                        doc.text(textLine, pageWidth - margin, y, { align: 'right' });
                        y += lineHeight;
                    });
                }
            });

            doc.save(`${currentFileName}_معدل.pdf`);
            console.log('✅ تم تحميل PDF بنجاح');
        }

        function downloadExcel() {
            const lines = extractedText.split('\n');
            const ws = XLSX.utils.aoa_to_sheet(lines.map(l => [l]));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الميزانية');
            XLSX.writeFile(wb, `${currentFileName}_معدل.xlsx`);
        }

        async function downloadNotesPdf() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const pageWidth = 210;
            const margin = 20;
            let y = margin;

            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            const title = 'ملف الملاحظات'.split('').reverse().join('');
            doc.text(title, pageWidth - margin, y, { align: 'right' });
            y += 10;

            doc.setFontSize(11);
            doc.setFont('helvetica', 'normal');

            if (currentNotes.length === 0) {
                const noErrors = 'لا توجد أخطاء'.split('').reverse().join('');
                doc.text(noErrors, pageWidth - margin, y, { align: 'right' });
            } else {
                currentNotes.forEach((note, i) => {
                    if (y > 270) {
                        doc.addPage();
                        y = margin;
                    }

                    const noteText = `${i + 1}. ${note.type}: ${note.message}`;
                    const reversedNote = noteText.split('').reverse().join('');

                    const lines = doc.splitTextToSize(reversedNote, pageWidth - (2 * margin));
                    lines.forEach(line => {
                        doc.text(line, pageWidth - margin, y, { align: 'right' });
                        y += 7;
                    });
                    y += 3;
                });
            }

            doc.save(`${currentFileName}_ملاحظات.pdf`);
            console.log('✅ تم تحميل ملاحظات PDF');
        }

        async function downloadNotesWord() {
            const { Document, Paragraph, TextRun, AlignmentType } = docx;

            const paragraphs = currentNotes.map((n, i) => new Paragraph({
                children: [new TextRun({
                    text: `${i + 1}. ${n.type}: ${n.message}`,
                    font: { name: "Arial" },
                    size: 22,
                    rightToLeft: true
                })],
                alignment: AlignmentType.RIGHT
            }));

            const doc = new Document({ sections: [{ children: paragraphs }] });
            const blob = await docx.Packer.toBlob(doc);
            saveAs(blob, `${currentFileName}_ملاحظات.docx`);
        }

        function resetUpload() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('fileInput').value = '';
            document.getElementById('previewBox').style.display = 'none';
            extractedText = '';
            currentNotes = [];
            originalDocXml = '';
            modifiedDocXml = '';
            originalFileBlob = null;
        }

        window.addEventListener('DOMContentLoaded', initSupabase);
    </script>
